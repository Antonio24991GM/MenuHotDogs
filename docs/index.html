<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Menu Board</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            min-height: 100vh;
            overflow: hidden;
        }
        
        #menu {
            width: 100%;
        }
        
        .category-container {
            margin-bottom: 18px;
        }
        
        .category-title {
            font-size: 2.4em;
            color: #fff;
            margin: 8px 0 12px 0;
            border-bottom: 2px solid #fff;
            padding-bottom: 4px;
            text-align: center;
        }
        
        .items-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            text-align: center;
        }
        
        .item-card {
            background-color: #111;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            min-height: 0;
        }
        
        .combo-number {
            font-size: 1.1em;
            color: #ffcc00;
            margin-bottom: 6px;
        }
        
        .item-card img {
            width: 100%;
            max-width: 180px;
            height: 110px;
            border-radius: 8px;
            object-fit: cover;
            margin-bottom: 8px;
        }
        
        .item-name {
            font-size: 1em;
            font-weight: bold;
            margin: 6px 0;
            color: #fff;
            line-height: 1.05;
        }
        
        .price {
            color: #ffd700;
            font-size: 1.8em;
            margin-bottom: 6px;
            line-height: 1;
        }
        
        .ingredients {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px 10px;
            color: #ccc;
            font-size: 0.95em;
            line-height: 1.1;
        }
        
        .price-options {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 8px;
            width: 100%;
        }
        
        .price-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1b1b1b;
            padding: 6px 8px;
            border-radius: 8px;
            font-size: 0.95em;
            color: #fff;
            width: 100%;
            box-sizing: border-box;
            gap: 8px;
        }
        
        .price-option .option-label {
            color: #fff;
            font-weight: bold;
            text-align: left;
            line-height: 1.1;
            white-space: normal;
            word-break: break-word;
            flex: 1;
        }
        
        .price-option .option-price {
            color: #ffd700;
            font-weight: bold;
            flex-shrink: 0;
        }
        
        @media (max-width: 1400px) {
            .items-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }
        
        @media (max-width: 1100px) {
            .items-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>

    <div id="menu"></div>

    <script>

                },

                {

                },
                {

                {

                {

                },
                {
                    "comboNumber": 7,

                    "price": 35,
                    "image": "https://i.ibb.co/CpyX724y/torta.png"
                }
            ]
        };

        function createMenuList(menu) {
            const menuContainer = document.getElementById('menu');
            for (const category in menu) {
                const categoryContainer = document.createElement('div');
                categoryContainer.className = 'category-container';
                
                const categoryTitle = document.createElement('div');
                categoryTitle.className = 'category-title';
                categoryTitle.textContent = category;
                categoryContainer.appendChild(categoryTitle);

                const itemsGrid = document.createElement('div');
                itemsGrid.className = 'items-grid';

                menu[category].forEach(item => {
                    const itemCard = document.createElement('div');
                    itemCard.className = 'item-card';

                    if (item.comboNumber) {
                        const comboNumberEl = document.createElement('div');
                        comboNumberEl.className = 'combo-number';
                        comboNumberEl.textContent = `Combo #${item.comboNumber}`;
                        itemCard.appendChild(comboNumberEl);
                    }

                    const imgEl = document.createElement('img');
                    imgEl.src = item.image;
                    imgEl.alt = item.item || item.description;
                    itemCard.appendChild(imgEl);
                    
                    const itemNameEl = document.createElement('div');
                    itemNameEl.className = 'item-name';
                    itemNameEl.textContent = item.item || item.description;
                    itemCard.appendChild(itemNameEl);

                    if (item.options && Array.isArray(item.options)) {
                        const optionsEl = document.createElement('div');
                        optionsEl.className = 'price-options';
                
                        item.options.forEach(option => {
                        const optionRow = document.createElement('div');
                        optionRow.className = 'price-option';
                
                        const labelEl = document.createElement('span');
                        labelEl.innerHTML = option.label.replace(/\n/g, "<br>");
                        labelEl.textContent = option.label;
                
                        const priceEl = document.createElement('span');
                        priceEl.className = 'option-price';
                        priceEl.textContent = `$${option.price}`;
                
                        optionRow.appendChild(labelEl);
                        optionRow.appendChild(priceEl);
                        optionsEl.appendChild(optionRow);
                    });
                
                        itemCard.appendChild(optionsEl);
                    } else {
                        const priceEl = document.createElement('div');
                        priceEl.className = 'price';
                        priceEl.textContent = `$${item.price}`;
                        itemCard.appendChild(priceEl);
                    }

                    if (item.ingredients) {
                        const ingredientsEl = document.createElement('div');
                        ingredientsEl.className = 'ingredients';
                        item.ingredients.forEach(ingredient => {
                            const ingredientItem = document.createElement('div');
                            ingredientItem.textContent = ingredient;
                            ingredientsEl.appendChild(ingredientItem);
                        });
                        itemCard.appendChild(ingredientsEl);
                    }

                    itemsGrid.appendChild(itemCard);
                });

                categoryContainer.appendChild(itemsGrid);
                menuContainer.appendChild(categoryContainer);
            }
        }

        createMenuList(menuData);
    </script>

</body>
</html>
